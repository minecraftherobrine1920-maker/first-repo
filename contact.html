<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ModernUI — Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-shapes">
    <span></span><span></span><span></span><span></span>
  </div>

  <nav class="nav">
    <div class="logo">ModernUI</div>

    <button id="hamburger" class="hamburger" aria-label="menu">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>

    <div class="toggle" id="toggle-mode" title="Toggle theme">🌙</div>
  </nav>

  <main class="page">
    <div class="container">
      <h1>Contact Us</h1>
      <p class="lead">Send a message — this demo form does not post anywhere by default.</p>

      <form id="contact-form" class="box contact-box" onsubmit="return false;">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" rows="6" placeholder="Message" required></textarea>
        <div class="form-actions">
          <button id="send" class="btn">Send Message</button>
          <button id="clear" class="btn outline" type="button">Clear</button>
        </div>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
